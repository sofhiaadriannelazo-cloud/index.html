<!DOCTYPE html>
<html>

	<head>
		<title> SR </title>
		<link rel="stylesheet" href="rests.css">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
		
	</head>

<body>

<nav>
    <a href="index.html" class="home-link"><i class="fas fa-home"></i></a>
</nav>

	<div class="title"> 
		<h1> Find your perfect Summer Rest destination <br> with BAL's voyage. </h1>
		<p> Book your Summer bliss to enjoy your vacation!<p>
	</div>

<div class="search-container">

    <form id="staycationForm">

        <div class="form-row">
            
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Stay Type</label>
                <select id="stayType">
                    <option> <b> Staycation </b> </option>
                    <option>Overnight</option>
                    <option>Weekend Getaway</option>
                    <option>Family Rest</option>
                    <option>Romance</option>
                </select>
            </div>

            <div class="input-group">
                <label>Check-in Date</label>
                <input type="date" id="checkin" required>
            </div>

            <div class="input-group">
                <label>Check-out Date</label>
                <input type="date" id="checkout" required>
            </div>

            <div class="input-group">
                <label>Guests</label>
                <input type="number" id="guests" min="1" value="1">
            </div>

        </div>

        <div class="button-container">
            <button type="submit">Book Summer Rest</button>
        </div>

    </form>

</div>

<script>
	const currentUser = localStorage.getItem("loggedUser");

	if (!currentUser) {
    window.location.href = "login.html";
	}
	
document.getElementById("staycationForm").addEventListener("submit", function(e){
    e.preventDefault();

    let button = this.querySelector("button");

    let name = document.getElementById("name").value;
    let type = document.getElementById("stayType").value;
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;
    let guests = document.getElementById("guests").value;

    let originalText = button.textContent;

    button.textContent = "Processing ⏳";
    button.disabled = true;

    setTimeout(function(){

        alert(
            "Booking Confirmed!\n\n" +
            "Name: " + name + "\n" +
            "Type: " + type + "\n" +
            "Check-in: " + checkin + "\n" +
            "Check-out: " + checkout + "\n" +
            "Guests: " + guests + "\n\n" +
            "Enjoy your cozy summer rest here only in Tara Spots! ️"
        );

        document.getElementById("staycationForm").reset();

        button.textContent = originalText;
        button.disabled = false;

    }, 2000);

});
</script>

</body>
</html>
